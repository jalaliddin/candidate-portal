services:

  # ── MySQL Database ───────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: candidate_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: candidate_portal
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-candidate_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/de
      dockerfile: Dockerfile
    container_name: candidate_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Candidate Portal"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: candidate_portal
      DB_USERNAME: ${DB_USERNAME:-candidate_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      SANCTUM_STATEFUL_DOMAINS: ${DOMAIN:-localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      LOG_CHANNEL: stderr
    volumes:
      - backend_storage:/var/www/html/storage/app/public
      - backend_logs:/var/www/html/storage/logs
    networks:
      - app_network
    expose:
      - "80"

  # ── Vue Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL:-http://localhost}/api
        VITE_STORAGE_URL: ${APP_URL:-http://localhost}/storage
    container_name: candidate_frontend
    restart: unless-stopped
    networks:
      - app_network
    expose:
      - "80"

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: candidate_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - backend_storage:/var/www/storage:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

  # ── One-time Setup (migrate + seed) ─────────────────────────────────────
  setup:
    build:
      context: ./backend/de
      dockerfile: Dockerfile
    container_name: candidate_setup
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: candidate_portal
      DB_USERNAME: ${DB_USERNAME:-candidate_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      SESSION_DRIVER: file
    command: >
      sh -c "php artisan migrate --force &&
             php artisan db:seed --force &&
             php artisan storage:link &&
             php artisan config:cache &&
             php artisan route:cache"
    networks:
      - app_network

volumes:
  db_data:
  backend_storage:
  backend_logs:

networks:
  app_network:
    driver: bridge
